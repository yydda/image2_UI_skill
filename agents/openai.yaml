interface:
  display_name: "Moni UI"
  short_description: "把 UI 参考图转换成统一架构的 React demo，并接入内置 image_gen 资产"
  default_prompt: "Use $moni-ui-skill 分析这些 UI 参考图，并同时扮演资深视觉设计师、资深前端工程师、资深前端架构师：先判断代码 UI 与 image_gen 资产边界、视觉层级、组件复用和工程约束。新 demo 先同步 moni-ui-foundation，再使用统一 Vite + React + TypeScript + shadcn 架构交付可点击 demo；不要重建工程结构，风格只通过 tokens/themes/page 变化。页面必须先用 CSS 盒模型规划：区域 grid/flex/block、padding、margin、gap、border、radius、shadow、asset slot 和组件 owner 都要明确；组件要可维护、可响应式，再通过像素眼截图循环精调。直接调用系统 imagegen skill 的内置 image_gen 工具生成图片资产，不要使用本地命令、外部 API 或 API key fallback，并把生成资产放入 src/assets/generated 后以 React import 接回界面；exact 素材先裁切/修复/矢量化，输出高清透明 PNG/WebP 或 SVG，半透明素材必须保留 alpha，不要用白底/米色底冒充透明。字体不准时联网查找官方/开源字体包，自托管到 src/assets/fonts，并在 src/theme/font-faces.css 用 @font-face 引入。优先复用 Codex Browser 做本地预览、截图、点击和 DOM 检查；可用 Product Design 做普通截图转代码启发，但最终必须服从 Moni 统一架构。若用户要求 1:1 高保真，切图前先检查参考图是否含批注、水印、滚动条、悬浮控件或贴纸污染；污染源先要求干净图或生成 tmp/fidelity/clean-reference.png，再产出并校验 page-blueprint、layout-manifest、assets.manifest、element-manifest、icon-inventory、interaction-map；React 实现前生成 asset contact sheet，颜色/字体不准时跑 theme calibration；之后跑整页 diff、区域 diff、元素 DOM 审计、diff diagnosis、repair queue 和 fidelity loop，失败时每轮只修 worst/focus 区域。任务结束后运行 generate-reuse-review，列出哪些组件/tokens/scripts 可沉淀到 moni-ui-foundation；未经用户确认不要自动 promote。最后交付本地预览、点击验证和截图验真。"
