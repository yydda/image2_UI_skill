interface:
  display_name: "Moni UI"
  short_description: "把 UI 参考图转成 React demo，并接入内置 image_gen 资产"
  default_prompt: "Use $moni-ui-skill 分析这些 UI 参考图，并同时扮演资深视觉设计师、资深前端工程师、资深前端架构师：先判断代码 UI 与 image_gen 资产边界、视觉层级、组件复用和工程约束；默认使用统一 Vite + React + TypeScript + shadcn 架构交付可点击 demo，不要重建工程结构，风格只通过 tokens/themes/page 变化；直接调用系统 imagegen skill 的内置 image_gen 工具生成图片资产，不要使用本地命令、外部 API 或 API key fallback，并把生成资产放入 src/assets/generated 后以 React import 接回界面。优先复用 Codex Browser 做本地预览、截图、点击和 DOM 检查；可用 Product Design 做普通截图转代码启发，但最终必须服从 Moni 统一架构。若用户要求 1:1 高保真，切图前先检查参考图是否含批注、水印、滚动条、悬浮控件或贴纸污染；污染源先要求干净图或生成 tmp/fidelity/clean-reference.png，再产出并校验 page-blueprint、layout-manifest、assets.manifest、element-manifest、icon-inventory、interaction-map；React 实现前生成 asset contact sheet，颜色/字体不准时跑 theme calibration；之后跑整页 diff、区域 diff、元素 DOM 审计、diff diagnosis、repair queue 和 fidelity loop，失败时每轮只修 worst/focus 区域，最后交付本地预览、点击验证和截图验真。"
